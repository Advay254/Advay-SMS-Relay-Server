services:
  - type: web
    name: sms-relay-server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    autoDeploy: true
